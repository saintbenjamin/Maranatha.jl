[integrand]
file = "sample_1d.jl"
name = "integrand"

[domain]
a = "0.0"
b = "3.14159265358979323846264338327950588"
dim = 1

[sampling]
nsamples = [2, 3, 4, 5, 6, 7, 8, 9]

[quadrature]
rule = "gauss_p4"
boundary = "LU_EXEX"

[error]
err_method = "refinement"
fit_terms = 4
nerr_terms = 3
ff_shift = 0

[execution]
use_error_jet = true
use_cuda = false
real_type = "Double64"

[output]
name_prefix = "sample_1d"
save_path = "jld2"
write_summary = true
save_file = true